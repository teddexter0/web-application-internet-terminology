<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">TCP/IP diagram</title>
  <desc id="desc">A packet delivery diagram showing TCP dividing data and IP routing packets between devices.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#f7f9ff" />
      <stop offset="100%" stop-color="#eef4ff" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0d3b8e" />
      <stop offset="100%" stop-color="#1749aa" />
    </linearGradient>
  </defs>

  <rect width="1200" height="680" rx="36" fill="url(#bg)" />
  <circle cx="150" cy="120" r="110" fill="#f1c40f" opacity="0.18" />
  <circle cx="1040" cy="560" r="135" fill="#b71f3b" opacity="0.08" />

  <g transform="translate(90 190)">
    <rect width="250" height="240" rx="26" fill="#ffffff" stroke="#d7e3ff" stroke-width="6" />
    <rect x="34" y="42" width="182" height="112" rx="18" fill="url(#panel)" />
    <text x="125" y="110" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" text-anchor="middle">Sender</text>
    <text x="125" y="195" fill="#37517e" font-family="Segoe UI, Arial, sans-serif" font-size="22" text-anchor="middle">Original data</text>
  </g>

  <g transform="translate(430 145)">
    <rect width="340" height="330" rx="30" fill="#ffffff" stroke="#f0d7de" stroke-width="6" />
    <text x="170" y="62" fill="#b71f3b" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="800" text-anchor="middle">TCP breaks data</text>
    <g transform="translate(42 98)">
      <rect width="256" height="44" rx="14" fill="#0d3b8e" />
      <rect y="62" width="256" height="44" rx="14" fill="#1749aa" />
      <rect y="124" width="256" height="44" rx="14" fill="#2f64c6" />
      <text x="128" y="29" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Packet 1</text>
      <text x="128" y="91" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Packet 2</text>
      <text x="128" y="153" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Packet 3</text>
    </g>
  </g>

  <g transform="translate(860 190)">
    <rect width="250" height="240" rx="26" fill="#ffffff" stroke="#d7e3ff" stroke-width="6" />
    <rect x="34" y="42" width="182" height="112" rx="18" fill="#b71f3b" />
    <text x="125" y="110" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" text-anchor="middle">Receiver</text>
    <text x="125" y="195" fill="#37517e" font-family="Segoe UI, Arial, sans-serif" font-size="22" text-anchor="middle">Reassembled data</text>
  </g>

  <g fill="none" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <path d="M340 310 C380 310, 395 310, 430 310" stroke="#0d3b8e" />
    <path d="M770 255 C810 240, 835 228, 860 228" stroke="#b71f3b" />
    <path d="M770 310 C820 310, 840 310, 860 310" stroke="#0d3b8e" />
    <path d="M770 365 C810 380, 835 392, 860 392" stroke="#f1c40f" />
  </g>

  <g fill="#0d3b8e">
    <polygon points="420,300 442,310 420,320" />
    <polygon points="852,300 874,310 852,320" />
  </g>
  <g fill="#b71f3b">
    <polygon points="852,218 874,228 852,238" />
  </g>
  <g fill="#f1c40f">
    <polygon points="852,382 874,392 852,402" />
  </g>

  <text x="600" y="590" fill="#14213d" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" text-anchor="middle">IP routes packets. TCP makes sure they arrive and fit back together correctly.</text>
</svg>
