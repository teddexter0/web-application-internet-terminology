<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">FTP diagram</title>
  <desc id="desc">A diagram showing files being uploaded and downloaded between a client computer and a server using FTP.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="90" x2="1080" y2="590" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fdf7ea" />
      <stop offset="100%" stop-color="#eef4ff" />
    </linearGradient>
  </defs>

  <rect width="1200" height="680" rx="36" fill="url(#bg)" />
  <circle cx="108" cy="116" r="74" fill="#f1c40f" opacity="0.2" />
  <circle cx="1036" cy="560" r="118" fill="#b71f3b" opacity="0.08" />

  <text x="600" y="78" fill="#14213d" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="800" text-anchor="middle">FTP moves files between a client and a server</text>

  <g transform="translate(110 170)">
    <rect width="310" height="250" rx="28" fill="#ffffff" stroke="#d7e3ff" stroke-width="6" />
    <text x="155" y="56" fill="#0d3b8e" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" text-anchor="middle">Client computer</text>
    <rect x="82" y="92" width="146" height="96" rx="18" fill="#0d3b8e" opacity="0.1" stroke="#0d3b8e" stroke-width="3" />
    <text x="155" y="132" fill="#14213d" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" text-anchor="middle">Local files</text>
    <text x="155" y="162" fill="#37517e" font-family="Segoe UI, Arial, sans-serif" font-size="20" text-anchor="middle">Upload and download</text>
  </g>

  <g transform="translate(780 170)">
    <rect width="310" height="250" rx="28" fill="#ffffff" stroke="#f0d7de" stroke-width="6" />
    <text x="155" y="56" fill="#b71f3b" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" text-anchor="middle">Remote server</text>
    <rect x="82" y="92" width="146" height="96" rx="18" fill="#b71f3b" opacity="0.1" stroke="#b71f3b" stroke-width="3" />
    <text x="155" y="132" fill="#14213d" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" text-anchor="middle">Server files</text>
    <text x="155" y="162" fill="#37517e" font-family="Segoe UI, Arial, sans-serif" font-size="20" text-anchor="middle">Shared over the network</text>
  </g>

  <path d="M420 264H760" fill="none" stroke="#0d3b8e" stroke-width="8" stroke-linecap="round" stroke-dasharray="12 12" />
  <path d="M760 264L730 244" fill="none" stroke="#0d3b8e" stroke-width="8" stroke-linecap="round" />
  <path d="M760 264L730 284" fill="none" stroke="#0d3b8e" stroke-width="8" stroke-linecap="round" />
  <text x="590" y="234" fill="#0d3b8e" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" text-anchor="middle">Upload</text>

  <path d="M780 332H440" fill="none" stroke="#b71f3b" stroke-width="8" stroke-linecap="round" stroke-dasharray="12 12" />
  <path d="M440 332L470 312" fill="none" stroke="#b71f3b" stroke-width="8" stroke-linecap="round" />
  <path d="M440 332L470 352" fill="none" stroke="#b71f3b" stroke-width="8" stroke-linecap="round" />
  <text x="610" y="382" fill="#b71f3b" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" text-anchor="middle">Download</text>

  <g transform="translate(232 476)">
    <rect width="736" height="116" rx="28" fill="#ffffff" stroke="#14213d" stroke-opacity="0.12" stroke-width="4" />
    <text x="368" y="48" fill="#14213d" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" text-anchor="middle">FTP is like a courier service for digital files.</text>
    <text x="368" y="84" fill="#37517e" font-family="Segoe UI, Arial, sans-serif" font-size="22" text-anchor="middle">It moves folders and documents from one machine to another.</text>
  </g>
</svg>
