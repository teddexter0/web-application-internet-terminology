<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Parts of a URL diagram</title>
  <desc id="desc">A labeled URL example showing protocol, domain, path, and query parts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fffdf5"/>
      <stop offset="1" stop-color="#edf5ff"/>
    </linearGradient>
    <linearGradient id="bar" x1="120" y1="154" x2="1080" y2="154" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d3b8e"/>
      <stop offset="1" stop-color="#b71f3b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" rx="40" fill="url(#bg)"/>
  <circle cx="104" cy="598" r="92" fill="#0d3b8e" opacity="0.08"/>
  <circle cx="1050" cy="114" r="72" fill="#f1c40f" opacity="0.2"/>

  <text x="600" y="78" fill="#14213d" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" text-anchor="middle">A URL is built from smaller address parts</text>

  <rect x="112" y="126" width="976" height="114" rx="28" fill="#ffffff" stroke="#0d3b8e" stroke-opacity="0.16" stroke-width="4"/>
  <rect x="144" y="156" width="912" height="54" rx="18" fill="url(#bar)"/>
  <text x="600" y="193" fill="#ffffff" font-family="Consolas, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">https://school.example.com/lessons/web?unit=2</text>

  <g stroke="#b71f3b" stroke-width="5" stroke-linecap="round">
    <path d="M260 256v58"/>
    <path d="M474 256v58"/>
    <path d="M718 256v58"/>
    <path d="M930 256v58"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <g transform="translate(112 314)">
      <rect width="256" height="138" rx="24" fill="#ffffff" stroke="#0d3b8e" stroke-opacity="0.18" stroke-width="3"/>
      <text x="128" y="48" fill="#0d3b8e" font-size="28" font-weight="800" text-anchor="middle">Protocol</text>
      <text x="128" y="86" fill="#14213d" font-size="22" text-anchor="middle">https</text>
      <text x="128" y="116" fill="#37517e" font-size="20" text-anchor="middle">how the browser connects</text>
    </g>
    <g transform="translate(396 314)">
      <rect width="256" height="138" rx="24" fill="#ffffff" stroke="#0d3b8e" stroke-opacity="0.18" stroke-width="3"/>
      <text x="128" y="48" fill="#0d3b8e" font-size="28" font-weight="800" text-anchor="middle">Domain</text>
      <text x="128" y="86" fill="#14213d" font-size="22" text-anchor="middle">school.example.com</text>
      <text x="128" y="116" fill="#37517e" font-size="20" text-anchor="middle">the website name</text>
    </g>
    <g transform="translate(680 314)">
      <rect width="206" height="138" rx="24" fill="#ffffff" stroke="#0d3b8e" stroke-opacity="0.18" stroke-width="3"/>
      <text x="103" y="48" fill="#b71f3b" font-size="28" font-weight="800" text-anchor="middle">Path</text>
      <text x="103" y="86" fill="#14213d" font-size="22" text-anchor="middle">/lessons/web</text>
      <text x="103" y="116" fill="#37517e" font-size="20" text-anchor="middle">the resource location</text>
    </g>
    <g transform="translate(914 314)">
      <rect width="174" height="138" rx="24" fill="#ffffff" stroke="#0d3b8e" stroke-opacity="0.18" stroke-width="3"/>
      <text x="87" y="48" fill="#b71f3b" font-size="28" font-weight="800" text-anchor="middle">Query</text>
      <text x="87" y="86" fill="#14213d" font-size="22" text-anchor="middle">?unit=2</text>
      <text x="87" y="116" fill="#37517e" font-size="20" text-anchor="middle">extra data</text>
    </g>
  </g>

  <path d="M218 548h764" stroke="#0d3b8e" stroke-width="6" stroke-linecap="round"/>
  <path d="M982 548l-32-22" stroke="#0d3b8e" stroke-width="6" stroke-linecap="round"/>
  <path d="M982 548l-32 22" stroke="#0d3b8e" stroke-width="6" stroke-linecap="round"/>
  <rect x="274" y="594" width="652" height="66" rx="28" fill="#ffffff" stroke="#14213d" stroke-opacity="0.12" stroke-width="3"/>
  <text x="600" y="636" fill="#14213d" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" text-anchor="middle">Together, the parts guide the browser to the exact page or file.</text>
</svg>
