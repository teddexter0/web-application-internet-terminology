<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Intranet diagram</title>
  <desc id="desc">A diagram showing employees using a private internal network for company communication, tools, and shared files.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1080" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fdf7ea" />
      <stop offset="100%" stop-color="#eef4ff" />
    </linearGradient>
  </defs>

  <rect width="1200" height="680" rx="36" fill="url(#bg)" />
  <circle cx="108" cy="120" r="74" fill="#f1c40f" opacity="0.22" />
  <circle cx="1040" cy="560" r="120" fill="#b71f3b" opacity="0.08" />

  <text x="600" y="78" fill="#14213d" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="800" text-anchor="middle">An intranet is a private network used inside an organization</text>

  <g transform="translate(148 176)">
    <rect width="904" height="320" rx="34" fill="#ffffff" stroke="#d7e3ff" stroke-width="6" />
    <text x="452" y="52" fill="#0d3b8e" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" text-anchor="middle">Company intranet</text>

    <g transform="translate(56 102)">
      <rect width="186" height="138" rx="24" fill="#f7faff" stroke="#0d3b8e" stroke-opacity="0.2" stroke-width="3" />
      <text x="93" y="46" fill="#0d3b8e" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" text-anchor="middle">Employees</text>
      <text x="93" y="86" fill="#37517e" font-family="Segoe UI, Arial, sans-serif" font-size="20" text-anchor="middle">Staff log in</text>
      <text x="93" y="112" fill="#37517e" font-family="Segoe UI, Arial, sans-serif" font-size="20" text-anchor="middle">from inside</text>
    </g>

    <g transform="translate(360 102)">
      <rect width="186" height="138" rx="24" fill="#fff8f1" stroke="#b71f3b" stroke-opacity="0.2" stroke-width="3" />
      <text x="93" y="46" fill="#b71f3b" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" text-anchor="middle">Tools</text>
      <text x="93" y="86" fill="#37517e" font-family="Segoe UI, Arial, sans-serif" font-size="20" text-anchor="middle">Messages</text>
      <text x="93" y="112" fill="#37517e" font-family="Segoe UI, Arial, sans-serif" font-size="20" text-anchor="middle">Portals</text>
    </g>

    <g transform="translate(664 102)">
      <rect width="186" height="138" rx="24" fill="#fffcef" stroke="#f1c40f" stroke-opacity="0.5" stroke-width="3" />
      <text x="93" y="46" fill="#8b6a00" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" text-anchor="middle">Resources</text>
      <text x="93" y="86" fill="#37517e" font-family="Segoe UI, Arial, sans-serif" font-size="20" text-anchor="middle">Files</text>
      <text x="93" y="112" fill="#37517e" font-family="Segoe UI, Arial, sans-serif" font-size="20" text-anchor="middle">Policies</text>
    </g>
  </g>

  <path d="M334 346H508" fill="none" stroke="#0d3b8e" stroke-width="8" stroke-linecap="round" />
  <path d="M638 346H812" fill="none" stroke="#b71f3b" stroke-width="8" stroke-linecap="round" />
  <circle cx="334" cy="346" r="10" fill="#0d3b8e" />
  <circle cx="508" cy="346" r="10" fill="#0d3b8e" />
  <circle cx="638" cy="346" r="10" fill="#b71f3b" />
  <circle cx="812" cy="346" r="10" fill="#b71f3b" />

  <text x="600" y="596" fill="#14213d" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" text-anchor="middle">It works like a private company hub for internal communication, collaboration, and shared resources.</text>
</svg>
