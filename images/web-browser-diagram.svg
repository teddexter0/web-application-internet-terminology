<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Web Browser diagram</title>
  <desc id="desc">A browser window receiving a web page from the internet and displaying it to the user.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#fffaf0" />
      <stop offset="100%" stop-color="#eef4ff" />
    </linearGradient>
  </defs>

  <rect width="1200" height="680" rx="36" fill="url(#bg)" />
  <circle cx="1020" cy="120" r="115" fill="#f1c40f" opacity="0.2" />
  <circle cx="140" cy="560" r="125" fill="#0d3b8e" opacity="0.08" />

  <g transform="translate(120 155)">
    <rect width="680" height="370" rx="30" fill="#ffffff" stroke="#d7e3ff" stroke-width="6" />
    <rect width="680" height="54" rx="30" fill="#dfe8ff" />
    <circle cx="34" cy="27" r="8" fill="#b71f3b" />
    <circle cx="60" cy="27" r="8" fill="#f1c40f" />
    <circle cx="86" cy="27" r="8" fill="#0d3b8e" />
    <rect x="120" y="16" width="510" height="22" rx="11" fill="#ffffff" />
    <text x="145" y="31" fill="#4a638f" font-family="Segoe UI, Arial, sans-serif" font-size="14">https://example.com</text>
    <text x="42" y="108" fill="#0d3b8e" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Browser displays the page</text>
    <rect x="42" y="146" width="264" height="144" rx="22" fill="#0d3b8e" />
    <text x="76" y="212" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">HTML</text>
    <text x="76" y="250" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">CSS</text>
    <text x="76" y="288" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Images</text>
    <rect x="340" y="154" width="278" height="26" rx="13" fill="#dce6f9" />
    <rect x="340" y="200" width="238" height="18" rx="9" fill="#e8eef8" />
    <rect x="340" y="232" width="214" height="18" rx="9" fill="#e8eef8" />
    <rect x="340" y="278" width="240" height="98" rx="18" fill="#fff2d1" />
    <text x="365" y="332" fill="#b71f3b" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Rendered page</text>
  </g>

  <g transform="translate(860 200)">
    <circle cx="120" cy="120" r="110" fill="#b71f3b" />
    <text x="120" y="104" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" text-anchor="middle">Web</text>
    <text x="120" y="142" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" text-anchor="middle">Content</text>
  </g>

  <g fill="none" stroke="#0d3b8e" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <path d="M800 320 C840 320, 850 320, 870 320" />
  </g>
  <g fill="#0d3b8e">
    <polygon points="862,310 884,320 862,330" />
  </g>

  <text x="600" y="590" fill="#14213d" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" text-anchor="middle">A browser requests web resources, interprets them, and shows a usable page to the user.</text>
</svg>
