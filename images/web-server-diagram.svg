<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Web Server diagram</title>
  <desc id="desc">Clients send requests to a server rack, and the server returns web pages and files.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#eef4ff" />
      <stop offset="100%" stop-color="#fff8fb" />
    </linearGradient>
    <linearGradient id="server" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0d3b8e" />
      <stop offset="100%" stop-color="#12326c" />
    </linearGradient>
  </defs>

  <rect width="1200" height="680" rx="36" fill="url(#bg)" />
  <circle cx="150" cy="120" r="105" fill="#f1c40f" opacity="0.18" />
  <circle cx="1050" cy="540" r="135" fill="#b71f3b" opacity="0.08" />

  <g transform="translate(95 250)">
    <rect width="220" height="150" rx="24" fill="#ffffff" stroke="#d7e3ff" stroke-width="6" />
    <rect x="44" y="42" width="132" height="78" rx="16" fill="#0d3b8e" />
    <text x="110" y="88" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" text-anchor="middle">Client</text>
    <text x="110" y="200" fill="#37517e" font-family="Segoe UI, Arial, sans-serif" font-size="21" text-anchor="middle">Sends request</text>
  </g>

  <g transform="translate(455 135)">
    <rect width="290" height="390" rx="32" fill="url(#server)" />
    <rect x="34" y="36" width="222" height="78" rx="18" fill="#ffffff" opacity="0.12" />
    <rect x="34" y="142" width="222" height="78" rx="18" fill="#ffffff" opacity="0.12" />
    <rect x="34" y="248" width="222" height="78" rx="18" fill="#ffffff" opacity="0.12" />
    <circle cx="64" cy="75" r="8" fill="#f1c40f" />
    <circle cx="64" cy="181" r="8" fill="#f1c40f" />
    <circle cx="64" cy="287" r="8" fill="#f1c40f" />
    <text x="145" y="360" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" text-anchor="middle">Web Server</text>
  </g>

  <g transform="translate(885 250)">
    <rect width="220" height="150" rx="24" fill="#ffffff" stroke="#f0d7de" stroke-width="6" />
    <rect x="42" y="34" width="136" height="30" rx="12" fill="#b71f3b" />
    <rect x="42" y="76" width="96" height="18" rx="9" fill="#dce6f9" />
    <rect x="42" y="104" width="122" height="18" rx="9" fill="#dce6f9" />
    <text x="110" y="200" fill="#37517e" font-family="Segoe UI, Arial, sans-serif" font-size="21" text-anchor="middle">Returns page</text>
  </g>

  <g fill="none" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <path d="M315 325 C365 325, 410 325, 455 325" stroke="#0d3b8e" />
    <path d="M745 325 C790 325, 835 325, 885 325" stroke="#b71f3b" />
  </g>
  <g fill="#0d3b8e">
    <polygon points="445,315 467,325 445,335" />
  </g>
  <g fill="#b71f3b">
    <polygon points="875,315 897,325 875,335" />
  </g>

  <text x="600" y="590" fill="#14213d" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" text-anchor="middle">A web server stores site files, handles requests, and sends the right response back to the browser.</text>
</svg>
