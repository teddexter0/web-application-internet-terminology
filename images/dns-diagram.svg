<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DNS diagram</title>
  <desc id="desc">A diagram showing DNS turning a domain name into an IP address before a website loads.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F7FF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="40" fill="url(#bg)"/>
  <circle cx="1090" cy="100" r="60" fill="#F1C40F" fill-opacity="0.16"/>
  <circle cx="130" cy="606" r="82" fill="#0D3B8E" fill-opacity="0.08"/>

  <text x="600" y="78" text-anchor="middle" fill="#14213D" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">DNS translates names into IP addresses</text>

  <rect x="94" y="160" width="286" height="178" rx="28" fill="url(#card)" stroke="#0D3B8E" stroke-opacity="0.16" stroke-width="3"/>
  <text x="237" y="210" text-anchor="middle" fill="#0D3B8E" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">User types a name</text>
  <rect x="132" y="236" width="210" height="58" rx="16" fill="#0D3B8E"/>
  <text x="237" y="273" text-anchor="middle" fill="#FFFFFF" font-family="Consolas, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">www.schoolsite.com</text>
  <text x="237" y="320" text-anchor="middle" fill="#14213D" font-family="Segoe UI, Arial, sans-serif" font-size="22">Easy for people to remember.</text>

  <rect x="456" y="132" width="286" height="234" rx="28" fill="url(#card)" stroke="#0D3B8E" stroke-opacity="0.16" stroke-width="3"/>
  <text x="599" y="182" text-anchor="middle" fill="#B71F3B" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">DNS lookup</text>
  <rect x="504" y="208" width="190" height="64" rx="18" fill="#B71F3B" fill-opacity="0.12" stroke="#B71F3B" stroke-width="2"/>
  <text x="599" y="248" text-anchor="middle" fill="#14213D" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Name server</text>
  <text x="599" y="298" text-anchor="middle" fill="#14213D" font-family="Segoe UI, Arial, sans-serif" font-size="22">Checks which numeric address</text>
  <text x="599" y="326" text-anchor="middle" fill="#14213D" font-family="Segoe UI, Arial, sans-serif" font-size="22">matches that domain name.</text>

  <rect x="818" y="160" width="286" height="178" rx="28" fill="url(#card)" stroke="#0D3B8E" stroke-opacity="0.16" stroke-width="3"/>
  <text x="961" y="210" text-anchor="middle" fill="#0D3B8E" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">IP address returned</text>
  <rect x="866" y="236" width="190" height="58" rx="16" fill="#0D3B8E"/>
  <text x="961" y="273" text-anchor="middle" fill="#FFFFFF" font-family="Consolas, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">203.0.113.24</text>
  <text x="961" y="320" text-anchor="middle" fill="#14213D" font-family="Segoe UI, Arial, sans-serif" font-size="22">The browser now knows where to connect.</text>

  <path d="M380 248H456" stroke="#0D3B8E" stroke-width="5" stroke-linecap="round"/>
  <path d="M456 248L428 228" stroke="#0D3B8E" stroke-width="5" stroke-linecap="round"/>
  <path d="M456 248L428 268" stroke="#0D3B8E" stroke-width="5" stroke-linecap="round"/>
  <path d="M742 248H818" stroke="#0D3B8E" stroke-width="5" stroke-linecap="round"/>
  <path d="M818 248L790 228" stroke="#0D3B8E" stroke-width="5" stroke-linecap="round"/>
  <path d="M818 248L790 268" stroke="#0D3B8E" stroke-width="5" stroke-linecap="round"/>

  <rect x="162" y="448" width="876" height="176" rx="30" fill="#FFFFFF" stroke="#14213D" stroke-opacity="0.12" stroke-width="3"/>
  <text x="600" y="500" text-anchor="middle" fill="#B71F3B" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">Without DNS, you would have to memorize numbers for every site.</text>
  <text x="600" y="548" text-anchor="middle" fill="#14213D" font-family="Segoe UI, Arial, sans-serif" font-size="24">DNS works like a contacts list: you use the website name, and it finds the matching address.</text>
  <text x="600" y="588" text-anchor="middle" fill="#0D3B8E" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Name first. Number behind the scenes. Website loads after that.</text>
</svg>
